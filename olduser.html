<!DOCTYPE html>
<html>
<head>
<title>Old User Login</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>

:root{
  --neon:      #7df9ff;
  --neon-glow: 0 0 12px #7df9ff, 0 0 40px rgba(125,249,255,0.4);
  --glass-bg:  rgba(8,8,20,0.55);
  --glass-bdr: rgba(125,249,255,0.12);
  --dark:      #0a0a18;
}

/* RESET */
*{
  margin:0; padding:0;
  box-sizing:border-box;
  font-family:'DM Sans', sans-serif;
}

/* BACKGROUND */
body{
  height:100vh;
  margin:0;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;

  background:
    linear-gradient(160deg,
      rgba(0,0,0,0.82) 0%,
      rgba(5,5,18,0.70) 50%,
      rgba(0,0,0,0.90) 100%),
    url("https://images.unsplash.com/photo-1536440136628-849c177e76a1?w=1800&q=80")
    center/cover no-repeat fixed;

  animation: zoomBg 24s ease-in-out infinite alternate;
  color: white;
}

body::before{
  content:'';
  position:fixed; inset:0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events:none; z-index:0; opacity:0.35;
}

@keyframes zoomBg{
  from{ background-size:100% auto; }
  to{   background-size:112% auto; }
}

/* LOGIN BOX */
.box{
  position:relative; z-index:1;
  background: var(--glass-bg);
  border: 1px solid var(--glass-bdr);
  padding: 52px 48px;
  border-radius: 28px;
  width: 360px;
  text-align: center;
  backdrop-filter: blur(28px) saturate(180%);
  -webkit-backdrop-filter: blur(28px) saturate(180%);
  box-shadow:
    0 0 0 1px rgba(125,249,255,0.05),
    0 30px 80px rgba(0,0,0,0.7);

  animation: riseIn 1.4s cubic-bezier(.22,1,.36,1) forwards;
  opacity:0;
}

.box::before{
  content:'';
  position:absolute;
  top:0; left:15%; right:15%; height:1px;
  background: linear-gradient(90deg, transparent, rgba(125,249,255,0.5), transparent);
}

@keyframes riseIn{
  from{ opacity:0; transform:translateY(30px); }
  to{   opacity:1; transform:translateY(0); }
}

/* TITLE */
.box h2{
  font-family:'Bebas Neue', sans-serif;
  font-size: 38px;
  letter-spacing: 3px;
  margin-bottom: 32px;
  color: var(--neon);
  text-shadow: var(--neon-glow);
}

/* INPUTS */
input{
  width:100%;
  padding: 14px 16px;
  margin: 10px 0;
  border: 1px solid rgba(125,249,255,0.15);
  border-radius: 12px;
  outline: none;
  font-size: 14px;
  font-family:'DM Sans', sans-serif;
  background: rgba(255,255,255,0.06);
  color: white;
  letter-spacing: 0.3px;
  transition: border-color 0.3s, box-shadow 0.3s;
}

input::placeholder{ color: rgba(255,255,255,0.3); }

input:focus{
  border-color: rgba(125,249,255,0.5);
  box-shadow: 0 0 16px rgba(125,249,255,0.12);
}

/* BUTTON */
button{
  position:relative;
  width:100%;
  padding: 14px;
  margin-top: 20px;
  border: 1.5px solid var(--neon);
  border-radius: 50px;
  cursor: pointer;
  font-size: 14px;
  font-family:'DM Sans', sans-serif;
  font-weight: 500;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  background: transparent;
  color: var(--neon);
  overflow: hidden;
  transition: color 0.32s, box-shadow 0.32s;
}

button::before{
  content:'';
  position:absolute; inset:0;
  background: var(--neon);
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.32s cubic-bezier(.22,1,.36,1);
  z-index:0;
}

button span{ position:relative; z-index:1; }

button:hover{
  color: var(--dark);
  box-shadow: var(--neon-glow);
}
button:hover::before{ transform:scaleX(1); }

button:active{ transform:scale(0.98); }

</style>
</head>

<body>

<div class="box">

<h2>Old User Login 🎬</h2>

<input type="text" id="email" placeholder="Enter Email">

<input type="password" id="password" placeholder="Enter Password">

<button onclick="loginUser()"><span>Login</span></button>

</div>

<script>

function loginUser(){

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

fetch("http://localhost:3000/login",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
email:email,
password:password
})

})
.then(res=>res.json())
.then(data=>{

if(data.message==="Login Success"){

alert("Login Successful");
window.location.href="main.html";

}else{

alert("Invalid Email or Password");

}

})
.catch(error=>{
console.log(error);
});

}

</script>

</body>
</html>
