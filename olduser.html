<!DOCTYPE html>
<html>
<head>
<title>Old User Login</title>

<style>

/* BACKGROUND WITH MOVIE IMAGE + DARK OVERLAY */
body{
  height:100vh;
  margin:0;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;

  background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.75)),
              url("https://images.unsplash.com/photo-1517602302552-471fe67acf66");

  background-size:cover;
  background-position:center;
  animation: zoomBg 20s infinite alternate;

  color:white;
}

/* ZOOM ANIMATION */
@keyframes zoomBg{
  from{ background-size:100%; }
  to{ background-size:110%; }
}

/* LOGIN BOX */
.box{
  background:rgba(255,255,255,0.08);
  padding:45px;
  border-radius:18px;
  width:320px;
  text-align:center;
  backdrop-filter: blur(10px);
  box-shadow:0 8px 30px rgba(0,0,0,0.6);

  animation: fadeIn 1.2s ease forwards;
  opacity:0;
}

/* FADE IN */
@keyframes fadeIn{
  to{ opacity:1; transform:translateY(0); }
  from{ opacity:0; transform:translateY(20px); }
}

/* TITLE */
.box h2{
  margin-bottom:20px;
  color:#7df9ff;
  text-shadow:0 0 10px #7df9ff;
}

/* INPUT FIELDS */
input{
  width:100%;
  padding:12px;
  margin:12px 0;
  border:none;
  border-radius:8px;
  outline:none;
  font-size:14px;

  background:rgba(255,255,255,0.15);
  color:white;
}

/* INPUT FOCUS EFFECT */
input:focus{
  box-shadow:0 0 10px #7df9ff;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#7df9ff;
  cursor:pointer;
  font-size:16px;
  font-weight:bold;
  transition:0.3s;
}

/* BUTTON HOVER */
button:hover{
  background:#50e3e0;
  transform:scale(1.05);
  box-shadow:0 0 15px #7df9ff;
}

/* BUTTON CLICK */
button:active{
  transform:scale(1);
}

</style>
</head>

<body>

<div class="box">

<h2>Old User Login 🎬</h2>

<input type="text" id="email" placeholder="Enter Email">

<input type="password" id="password" placeholder="Enter Password">

<button onclick="loginUser()">Login</button>

</div>

<script>

function loginUser(){

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

fetch("http://localhost:3000/login",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
email:email,
password:password
})

})
.then(res=>res.json())
.then(data=>{

if(data.message==="Login Success"){

alert("Login Successful");
window.location.href="main.html";

}else{

alert("Invalid Email or Password");

}

})
.catch(error=>{
console.log(error);
});

}

</script>

</body>
</html>
