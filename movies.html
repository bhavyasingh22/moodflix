<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MoodFlix Movies</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>

:root{
  --neon:      #7df9ff;
  --neon-glow: 0 0 12px #7df9ff, 0 0 40px rgba(125,249,255,0.4);
  --glass-bg:  rgba(8,8,20,0.6);
  --glass-bdr: rgba(125,249,255,0.12);
  --dark:      #0a0a18;
}

/* RESET */
*{
  margin:0; padding:0;
  box-sizing:border-box;
  font-family:'DM Sans', sans-serif;
}

/* BACKGROUND */
body{
  min-height:100vh;
  color:white;

  background:
    linear-gradient(160deg,
      rgba(0,0,0,0.85) 0%,
      rgba(5,5,18,0.75) 50%,
      rgba(0,0,0,0.92) 100%),
    url("https://images.unsplash.com/photo-1536440136628-849c177e76a1?w=1800&q=80")
    center/cover no-repeat fixed;

  animation: zoomBg 24s ease-in-out infinite alternate;
}

body::before{
  content:'';
  position:fixed; inset:0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events:none; z-index:0; opacity:0.35;
}

@keyframes zoomBg{
  from{ background-size:100% auto; }
  to{   background-size:112% auto; }
}

/* HEADER */
.header{
  position:relative; z-index:1;
  text-align:center;
  padding: 50px 20px 28px;
  border-bottom: 1px solid rgba(125,249,255,0.06);
}

.title{
  font-family:'Bebas Neue', sans-serif;
  font-size: 52px;
  letter-spacing: 4px;
  color: var(--neon);
  text-shadow: var(--neon-glow);
  margin-bottom: 22px;
}

/* SEARCH */
.search-container input{
  padding: 14px 22px;
  width: 44%;
  border-radius: 50px;
  border: 1px solid var(--glass-bdr);
  outline: none;
  font-size: 14px;
  font-family:'DM Sans', sans-serif;
  letter-spacing: 0.5px;
  background: rgba(255,255,255,0.06);
  color: white;
  backdrop-filter: blur(10px);
  transition: border-color 0.3s, box-shadow 0.3s;
}

.search-container input::placeholder{ color: rgba(255,255,255,0.35); }

.search-container input:focus{
  border-color: rgba(125,249,255,0.5);
  box-shadow: 0 0 18px rgba(125,249,255,0.15);
}

/* MOOD FILTER */
.mood-filter{
  position:relative; z-index:1;
  text-align:center;
  margin: 28px 0;
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
  padding:0 20px;
}

.mood-btn{
  position:relative;
  padding: 10px 22px;
  border: 1px solid rgba(125,249,255,0.2);
  border-radius: 50px;
  cursor: pointer;
  background: rgba(8,8,20,0.5);
  backdrop-filter: blur(10px);
  font-family:'DM Sans', sans-serif;
  font-weight: 500;
  font-size: 13px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.7);
  overflow:hidden;
  transition: border-color 0.3s, color 0.3s, box-shadow 0.3s, transform 0.2s;
}

.mood-btn::before{
  content:'';
  position:absolute; inset:0;
  background: var(--neon);
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.32s cubic-bezier(.22,1,.36,1);
  z-index:0;
}

.mood-btn span{ position:relative; z-index:1; }

.mood-btn:hover{
  border-color: var(--neon);
  color: var(--dark);
  box-shadow: var(--neon-glow);
  transform: translateY(-2px);
}
.mood-btn:hover::before{ transform:scaleX(1); }

/* MOVIES GRID */
.movies{
  position:relative; z-index:1;
  display:grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 28px;
  padding: 40px 50px 60px;
}

/* CARD */
.card{
  background: var(--glass-bg);
  border: 1px solid var(--glass-bdr);
  border-radius: 18px;
  overflow: hidden;
  text-align: center;
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
}

.card:hover{
  transform: translateY(-10px) scale(1.02);
  box-shadow: 0 20px 50px rgba(0,0,0,0.8), 0 0 20px rgba(125,249,255,0.1);
  border-color: rgba(125,249,255,0.3);
}

.card img{
  width:100%;
  height: 270px;
  object-fit:cover;
  display:block;
  filter: brightness(0.9);
  transition: filter 0.3s;
}

.card:hover img{ filter: brightness(1.05); }

.card h3{
  margin: 14px 14px 6px;
  font-size: 15px;
  font-weight: 500;
  letter-spacing: 0.5px;
}

.card p{
  color: rgba(255,255,255,0.45);
  font-size: 12px;
  letter-spacing: 1.5px;
  text-transform:uppercase;
  margin-bottom: 16px;
}

/* WATCH BUTTON */
.link-btn{
  display: inline-block;
  background: transparent;
  border: 1px solid var(--neon);
  padding: 8px 22px;
  border-radius: 50px;
  text-decoration: none;
  color: var(--neon);
  font-family:'DM Sans', sans-serif;
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 2px;
  text-transform:uppercase;
  margin-bottom: 18px;
  transition: background 0.3s, color 0.3s, box-shadow 0.3s;
}

.link-btn:hover{
  background: var(--neon);
  color: var(--dark);
  box-shadow: var(--neon-glow);
}

</style>
</head>

<body>

<div class="header">
  <div class="title" id="moodTitle">MoodFlix Movies 🎬</div>

  <div class="search-container">
    <input type="text" id="searchInput" placeholder="Search movies...">
  </div>
</div>

<div class="mood-filter">
  <button class="mood-btn" onclick="filterMood('happy')"><span>Happy</span></button>
  <button class="mood-btn" onclick="filterMood('sad')"><span>Sad</span></button>
  <button class="mood-btn" onclick="filterMood('romantic')"><span>Romantic</span></button>
  <button class="mood-btn" onclick="filterMood('excited')"><span>Excited</span></button>
  <button class="mood-btn" onclick="filterMood('depressed')"><span>Depressed</span></button>
  <button class="mood-btn" onclick="filterMood('relaxed')"><span>Relaxed</span></button>
</div>

<div class="movies" id="movieContainer"></div>

<script>

let allMovies = [];
let currentMood = localStorage.getItem("mood") || "happy";

fetch("http://localhost:3000/movies")
.then(res => res.json())
.then(data => {
  allMovies = data;
  displayMovies(currentMood);
});

function displayMovies(mood, search=""){
  const container = document.getElementById("movieContainer");
  container.innerHTML = "";

  const filtered = allMovies.filter(m =>
    m.mood === mood &&
    m.name.toLowerCase().includes(search.toLowerCase())
  );

  filtered.forEach(movie => {

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img src="${movie.image}">
      <h3>${movie.name}</h3>
      <p>${movie.platform}</p>
      <a class="link-btn" href="${movie.link}" target="_blank">Watch</a>
    `;

    container.appendChild(card);
  });
}

function filterMood(mood){
  currentMood = mood;
  localStorage.setItem("mood", mood);
  displayMovies(mood, document.getElementById("searchInput").value);
}

document.getElementById("searchInput")
.addEventListener("input",(e)=>{
  displayMovies(currentMood, e.target.value);
});

</script>

</body>
</html>
